<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1200"/>
<title>NYTHOS OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #060912;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    background: #060912;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    overflow: hidden;
  }

  /* Subtle grid */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Purple radial glow behind logo */
  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -54%);
    width: 560px;
    height: 420px;
    background: radial-gradient(ellipse at center, rgba(108,99,255,0.22) 0%, rgba(108,99,255,0.06) 45%, transparent 70%);
    pointer-events: none;
  }

  /* Bottom edge fade */
  .fade-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(to bottom, transparent, rgba(6,9,18,0.7));
  }

  /* Top-left corner accent */
  .corner-tl {
    position: absolute;
    top: 0; left: 0;
    width: 2px; height: 48px;
    background: linear-gradient(to bottom, #6c63ff, transparent);
  }
  .corner-tl::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 48px; height: 2px;
    background: linear-gradient(to right, #6c63ff, transparent);
  }
  /* Bottom-right corner accent */
  .corner-br {
    position: absolute;
    bottom: 0; right: 0;
    width: 2px; height: 48px;
    background: linear-gradient(to top, #6c63ff, transparent);
  }
  .corner-br::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 48px; height: 2px;
    background: linear-gradient(to left, #6c63ff, transparent);
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .logo-wrap {
    width: 88px;
    height: 88px;
    margin-bottom: 28px;
  }

  .wordmark {
    font-size: 88px;
    font-weight: 900;
    letter-spacing: 0.22em;
    color: #e8eaf0;
    line-height: 1;
    margin-bottom: 18px;
    /* Subtle text glow */
    text-shadow: 0 0 60px rgba(108,99,255,0.35);
  }

  .tagline {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.22em;
    color: #8892a4;
    text-transform: uppercase;
    margin-bottom: 44px;
  }

  .pills {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 44px;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    border-radius: 999px;
    border: 1px solid #1e2d45;
    background: rgba(13,21,37,0.9);
    font-size: 13px;
    font-weight: 600;
    color: #e8eaf0;
    letter-spacing: 0.02em;
  }

  .pill-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #00e5a0;
    box-shadow: 0 0 6px rgba(0,229,160,0.7);
    flex-shrink: 0;
  }

  .pill-dot.purple {
    background: #6c63ff;
    box-shadow: 0 0 6px rgba(108,99,255,0.7);
  }

  .pill-dot.orange {
    background: #f7931a;
    box-shadow: 0 0 6px rgba(247,147,26,0.7);
  }

  .divider {
    width: 1px;
    height: 14px;
    background: #1e2d45;
  }

  .domain {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: #5a6478;
  }
</style>
</head>
